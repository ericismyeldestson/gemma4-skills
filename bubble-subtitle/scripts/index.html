<html>
<head><meta charset="utf-8"></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    const parsed = JSON.parse(data);
    const mode   = parsed.mode || 'camera';
    const lang   = encodeURIComponent(parsed.lang || 'zh-CN');

    // ════════════════════════════════════════
    // Mode 1: Camera AR overlay (interactive)
    // ════════════════════════════════════════
    if (mode === 'camera') {
      return JSON.stringify({
        result: '📷 AR camera mode with face-tracked speech bubbles is now active.',
        webview: { url: `webview.html?mode=camera&lang=${lang}`, aspectRatio: 0.75 }
      });
    }

    // ════════════════════════════════════════
    // Mode 2: Audio only recording (interactive)
    // ════════════════════════════════════════
    if (mode === 'record') {
      return JSON.stringify({
        result: '🎙️ Audio recording mode with animated bubbles is now active.',
        webview: { url: `webview.html?mode=record&lang=${lang}`, aspectRatio: 1.5 }
      });
    }

    // ════════════════════════════════════════
    // Mode 4: Snapshot — capture camera frame,
    //   return as image for Gemma 4 vision
    // ════════════════════════════════════════
    if (mode === 'snapshot') {
      const facing = parsed.camera || 'user';
      const width  = parsed.width  || 640;
      const height = parsed.height || 480;

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: facing, width: { ideal: width }, height: { ideal: height } },
          audio: false
        });
      } catch (e) {
        return JSON.stringify({ error: 'Camera access denied or unavailable: ' + e.message });
      }

      // Create off-screen video + canvas
      const video  = document.createElement('video');
      video.srcObject = stream;
      video.setAttribute('playsinline', '');
      video.muted = true;
      await video.play();

      // Wait for at least one frame
      await new Promise(r => setTimeout(r, 500));

      const canvas = document.createElement('canvas');
      canvas.width  = video.videoWidth  || width;
      canvas.height = video.videoHeight || height;
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

      // Stop camera immediately
      stream.getTracks().forEach(t => t.stop());

      // Convert to JPEG base64 (smaller than PNG)
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      const base64  = dataUrl.split(',')[1];

      const camLabel = facing === 'user' ? 'front' : 'rear';
      return JSON.stringify({
        result: `Snapshot captured from ${camLabel} camera (${canvas.width}x${canvas.height}).`,
        image: base64
      });
    }

    // ════════════════════════════════════════
    // Mode 5: Listen — capture audio,
    //   transcribe on-device, return text
    // ════════════════════════════════════════
    if (mode === 'listen') {
      const seconds  = Math.min(Math.max(parsed.seconds || 5, 1), 15);
      const listenLang = decodeURIComponent(lang);

      // Strategy A: Web Speech API (preferred — lightweight)
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SR) {
        const result = await new Promise((resolve) => {
          const rec = new SR();
          rec.lang = listenLang;
          rec.continuous = true;
          rec.interimResults = false;
          const finals = [];
          let resolved = false;

          rec.onresult = (e) => {
            for (let i = e.resultIndex; i < e.results.length; i++) {
              if (e.results[i].isFinal) finals.push(e.results[i][0].transcript.trim());
            }
          };
          rec.onerror = (e) => {
            if (!resolved) { resolved = true; resolve({ ok: false, err: e.error }); }
          };
          rec.onend = () => {
            if (!resolved) { resolved = true; resolve({ ok: true, text: finals.join('') }); }
          };

          rec.start();
          setTimeout(() => {
            if (!resolved) { try { rec.stop(); } catch(_){} }
          }, seconds * 1000);
        });

        if (result.ok) {
          const text = result.text || '';
          return JSON.stringify({
            result: text
              ? `Transcription (${seconds}s, ${listenLang}): ${text}`
              : `[Silence — no speech detected in ${seconds} seconds]`
          });
        }
        // Fall through to Strategy B if Web Speech fails
      }

      // Strategy B: MediaRecorder + return audio metadata
      //   (Cannot run Whisper here without loading 75MB model;
      //    return helpful error so Gemma 4 can suggest camera/record mode)
      try {
        const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg']
          .find(t => MediaRecorder.isTypeSupported(t)) || '';
        const recorder = new MediaRecorder(audioStream, mimeType ? { mimeType } : {});
        const chunks = [];

        const audioResult = await new Promise((resolve) => {
          recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
          recorder.onstop = () => {
            audioStream.getTracks().forEach(t => t.stop());
            const blob = new Blob(chunks, { type: mimeType || 'audio/webm' });
            // Check if there's meaningful audio (size > threshold)
            if (blob.size < 2000) {
              resolve({ text: '', silence: true });
            } else {
              resolve({ text: '', hasAudio: true, sizeKB: Math.round(blob.size / 1024) });
            }
          };
          recorder.start();
          setTimeout(() => { try { recorder.stop(); } catch(_){} }, seconds * 1000);
        });

        if (audioResult.silence) {
          return JSON.stringify({ result: `[Silence — no audio detected in ${seconds}s]` });
        }
        return JSON.stringify({
          result: `Audio captured (${audioResult.sizeKB}KB, ${seconds}s) but speech recognition unavailable in this context. Suggest using camera or record mode for real-time transcription.`
        });

      } catch (e) {
        return JSON.stringify({ error: 'Microphone access denied: ' + e.message });
      }
    }

    // ════════════════════════════════════════
    // Mode 3: Playback (interactive)
    // ════════════════════════════════════════
    const segs = parsed.segments;
    if (!segs || !Array.isArray(segs) || segs.length === 0) {
      // No data → fall back to camera
      return JSON.stringify({
        result: '📷 No transcript data found. Launching AR camera mode.',
        webview: { url: `webview.html?mode=camera&lang=${lang}`, aspectRatio: 0.75 }
      });
    }

    parsed.segments = segs.map(s => ({
      start: s.start, end: s.end, text: s.text,
      speaker: s.speaker || 'A', position: s.position || 'center'
    }));
    if (!parsed.duration) parsed.duration = segs[segs.length - 1].end;

    const encoded = encodeURIComponent(JSON.stringify(parsed));
    const mm = Math.floor(parsed.duration / 60), ss = Math.round(parsed.duration % 60);

    return JSON.stringify({
      result: `Generated ${segs.length} subtitle segments, duration ${mm}m${ss}s.`,
      webview: { url: `webview.html?mode=play&data=${encoded}`, aspectRatio: 1.5 }
    });

  } catch (e) {
    return JSON.stringify({ error: 'Processing error: ' + e.message });
  }
};
</script>
</body>
</html>
