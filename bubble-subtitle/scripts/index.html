<html>
<head><meta charset="utf-8"></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    const parsed = JSON.parse(data);
    const mode   = parsed.mode || 'camera';
    const lang   = encodeURIComponent(parsed.lang || 'zh-CN');

    // ── Mode 1: Camera AR overlay ──
    if (mode === 'camera') {
      return JSON.stringify({
        result: '📷 AR 气泡字幕已启动，对着摄像头说话吧！',
        webview: { url: `webview.html?mode=camera&lang=${lang}`, aspectRatio: 0.75 }
      });
    }

    // ── Mode 2: Audio only ──
    if (mode === 'record') {
      return JSON.stringify({
        result: '🎙️ 录音气泡字幕已启动，点击麦克风开始说话！',
        webview: { url: `webview.html?mode=record&lang=${lang}`, aspectRatio: 1.5 }
      });
    }

    // ── Mode 3: Playback ──
    const segs = parsed.segments;
    if (!segs || !Array.isArray(segs) || segs.length === 0) {
      // No data → fall back to camera
      return JSON.stringify({
        result: '📷 未检测到字幕数据，启动 AR 摄像头模式。',
        webview: { url: `webview.html?mode=camera&lang=${lang}`, aspectRatio: 0.75 }
      });
    }

    parsed.segments = segs.map(s => ({
      start: s.start, end: s.end, text: s.text,
      speaker: s.speaker || 'A', position: s.position || 'center'
    }));
    if (!parsed.duration) parsed.duration = segs[segs.length - 1].end;

    const encoded = encodeURIComponent(JSON.stringify(parsed));
    const mm = Math.floor(parsed.duration / 60), ss = Math.round(parsed.duration % 60);

    return JSON.stringify({
      result: `✅ 已生成 ${segs.length} 段气泡字幕，时长 ${mm}分${ss}秒。`,
      webview: { url: `webview.html?mode=play&data=${encoded}`, aspectRatio: 1.5 }
    });

  } catch (e) {
    return JSON.stringify({ error: `处理失败：${e.message}` });
  }
};
</script>
</body>
</html>
