<html>
<head><meta charset="utf-8"></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    const parsed = JSON.parse(data);
    const mode   = parsed.mode || 'camera';
    const lang   = encodeURIComponent(parsed.lang || 'zh-CN');

    // ════════════════════════════════════════
    // Mode 1: Camera AR overlay (interactive)
    // ════════════════════════════════════════
    if (mode === 'camera') {
      return JSON.stringify({
        result: 'AR camera mode started. Speak to see face-tracked bubbles.',
        webview: { url: `webview.html?mode=camera&lang=${lang}`, aspectRatio: 0.75 }
      });
    }

    // ════════════════════════════════════════
    // Mode 2: Audio only recording (interactive)
    // ════════════════════════════════════════
    if (mode === 'record') {
      return JSON.stringify({
        result: 'Audio recording mode started. Tap mic to begin.',
        webview: { url: `webview.html?mode=record&lang=${lang}`, aspectRatio: 1.5 }
      });
    }

    // ════════════════════════════════════════
    // Mode 4: Snapshot — capture camera frame
    // ════════════════════════════════════════
    if (mode === 'snapshot') {
      // Check if camera API is available in this webview context
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        // Hidden webview lacks camera permission — fall back to interactive camera
        return JSON.stringify({
          result: 'Snapshot not available in background. Opening camera mode instead.',
          webview: { url: `webview.html?mode=camera&lang=${lang}`, aspectRatio: 0.75 }
        });
      }

      const facing = parsed.camera || 'user';

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: facing, width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        });
      } catch (e) {
        // Camera denied — fall back to interactive camera mode
        return JSON.stringify({
          result: 'Camera access unavailable. Opening camera mode instead.',
          webview: { url: `webview.html?mode=camera&lang=${lang}`, aspectRatio: 0.75 }
        });
      }

      try {
        const video = document.createElement('video');
        video.srcObject = stream;
        video.setAttribute('playsinline', '');
        video.muted = true;

        // Wait for video to be ready
        await new Promise((resolve, reject) => {
          video.onloadeddata = resolve;
          video.onerror = reject;
          setTimeout(reject, 3000); // 3s timeout
          video.play().catch(reject);
        });

        // Extra frame delay for camera warmup
        await new Promise(r => setTimeout(r, 300));

        const canvas = document.createElement('canvas');
        const vw = video.videoWidth || 640;
        const vh = video.videoHeight || 480;
        canvas.width = vw;
        canvas.height = vh;
        canvas.getContext('2d').drawImage(video, 0, 0, vw, vh);

        stream.getTracks().forEach(t => t.stop());

        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        const base64 = dataUrl.split(',')[1];

        return JSON.stringify({
          result: 'Photo captured. Describe what you see.',
          image: base64
        });
      } catch (e2) {
        stream.getTracks().forEach(t => t.stop());
        // Fall back to interactive camera
        return JSON.stringify({
          result: 'Photo capture failed. Opening camera mode instead.',
          webview: { url: `webview.html?mode=camera&lang=${lang}`, aspectRatio: 0.75 }
        });
      }
    }

    // ════════════════════════════════════════
    // Mode 5: Listen — capture + transcribe
    // ════════════════════════════════════════
    if (mode === 'listen') {
      const seconds = Math.min(Math.max(parsed.seconds || 8, 2), 15);
      const listenLang = decodeURIComponent(lang);

      // Check mic availability
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        return JSON.stringify({
          result: 'Microphone not available. Opening recording mode instead.',
          webview: { url: `webview.html?mode=record&lang=${lang}`, aspectRatio: 1.5 }
        });
      }

      // Try Web Speech API first
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SR) {
        try {
          const result = await new Promise((resolve) => {
            const rec = new SR();
            rec.lang = listenLang;
            rec.continuous = true;
            rec.interimResults = false;
            const finals = [];
            let done = false;

            rec.onresult = (e) => {
              for (let i = e.resultIndex; i < e.results.length; i++) {
                if (e.results[i].isFinal) finals.push(e.results[i][0].transcript.trim());
              }
            };
            rec.onerror = (e) => {
              if (!done) { done = true; resolve({ ok: false, err: e.error }); }
            };
            rec.onend = () => {
              if (!done) { done = true; resolve({ ok: true, text: finals.join('') }); }
            };

            try { rec.start(); } catch(e) {
              done = true; resolve({ ok: false, err: e.message });
            }

            setTimeout(() => {
              if (!done) { try { rec.stop(); } catch(_){} }
            }, seconds * 1000);
          });

          if (result.ok) {
            const text = result.text || '';
            if (text) {
              return JSON.stringify({ result: 'I heard: ' + text });
            } else {
              return JSON.stringify({ result: 'I listened for ' + seconds + ' seconds but heard no speech.' });
            }
          }
        } catch(e) { /* fall through */ }
      }

      // Fallback: suggest interactive mode
      return JSON.stringify({
        result: 'Speech recognition not available here. Opening recording mode instead.',
        webview: { url: `webview.html?mode=record&lang=${lang}`, aspectRatio: 1.5 }
      });
    }

    // ════════════════════════════════════════
    // Mode 3: Playback (interactive)
    // ════════════════════════════════════════
    const segs = parsed.segments;
    if (!segs || !Array.isArray(segs) || segs.length === 0) {
      return JSON.stringify({
        result: 'No transcript data. Opening camera mode instead.',
        webview: { url: `webview.html?mode=camera&lang=${lang}`, aspectRatio: 0.75 }
      });
    }

    parsed.segments = segs.map(s => ({
      start: s.start, end: s.end, text: s.text,
      speaker: s.speaker || 'A', position: s.position || 'center'
    }));
    if (!parsed.duration) parsed.duration = segs[segs.length - 1].end;

    const encoded = encodeURIComponent(JSON.stringify(parsed));
    const mm = Math.floor(parsed.duration / 60), ss = Math.round(parsed.duration % 60);

    return JSON.stringify({
      result: `Playing ${segs.length} subtitle segments (${mm}m${ss}s).`,
      webview: { url: `webview.html?mode=play&data=${encoded}`, aspectRatio: 1.5 }
    });

  } catch (e) {
    return JSON.stringify({ error: 'Error: ' + e.message });
  }
};
</script>
</body>
</html>
