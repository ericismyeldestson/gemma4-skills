<html>
<head><meta charset="utf-8"></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    const parsed = JSON.parse(data);
    const mode = parsed.mode || 'play';

    // ── Mode 1: Live recording via Web Speech API ──
    if (mode === 'record') {
      const lang = parsed.lang || 'zh-CN';
      return JSON.stringify({
        result: '🎙️ 气泡字幕录音器已启动，点击麦克风开始说话！',
        webview: {
          url: `webview.html?mode=record&lang=${encodeURIComponent(lang)}`,
          aspectRatio: 1.5
        }
      });
    }

    // ── Mode 2: Playback from transcript data ──
    if (!parsed.segments || !Array.isArray(parsed.segments) || parsed.segments.length === 0) {
      // No segments: default to record mode
      return JSON.stringify({
        result: '🎙️ 未检测到字幕数据，启动实时录音模式。',
        webview: {
          url: 'webview.html?mode=record&lang=zh-CN',
          aspectRatio: 1.5
        }
      });
    }

    // Validate and fill defaults
    parsed.segments = parsed.segments.map(seg => ({
      start:    seg.start,
      end:      seg.end,
      text:     seg.text,
      speaker:  seg.speaker  || 'A',
      position: seg.position || 'center'
    }));
    if (!parsed.duration) {
      parsed.duration = parsed.segments[parsed.segments.length - 1].end;
    }

    const encoded = encodeURIComponent(JSON.stringify(parsed));
    const count   = parsed.segments.length;
    const dur     = parsed.duration;
    const mm = Math.floor(dur / 60), ss = Math.round(dur % 60);

    return JSON.stringify({
      result: `✅ 已生成 ${count} 段气泡字幕，时长 ${mm}分${ss}秒。`,
      webview: {
        url: `webview.html?mode=play&data=${encoded}`,
        aspectRatio: 1.5
      }
    });

  } catch (e) {
    return JSON.stringify({ error: `处理失败：${e.message}` });
  }
};
</script>
</body>
</html>
