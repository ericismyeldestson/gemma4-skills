<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>气泡字幕</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --A: #5865F2; --B: #27AE60; --C: #E91E8C; --D: #F39C12;
      --bg: #0d0d14; --dim: rgba(255,255,255,0.45); --surf: rgba(255,255,255,0.07);
    }
    html, body { height: 100%; }
    body {
      background: #000; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif;
      position: fixed; inset: 0; overflow: hidden; user-select: none;
    }

    /* ══ WHISPER LOADING OVERLAY ══ */
    #wl-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(10,10,20,0.97);
      display: flex; align-items: center; justify-content: center;
    }
    .wl-box {
      text-align: center; padding: 32px 28px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px; width: 280px;
    }
    .wl-icon { font-size: 48px; margin-bottom: 14px; }
    .wl-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .wl-sub { font-size: 12px; color: var(--dim); margin-bottom: 20px; line-height: 1.6; }
    .wl-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
    .wl-fill { height: 100%; background: var(--A); border-radius: 3px; width: 0%; transition: width 0.3s ease; }
    .wl-pct { font-size: 13px; color: var(--dim); margin-bottom: 16px; }
    .wl-skip {
      background: none; border: 1px solid rgba(255,255,255,0.2);
      color: var(--dim); padding: 8px 18px; border-radius: 12px;
      cursor: pointer; font-size: 12px;
    }
    .wl-skip:active { opacity: 0.6; }

    /* ══ STT MODE PILL (Whisper vs Cloud) ══ */
    #stt-toggle {
      position: fixed; top: 10px; right: 10px; z-index: 20;
      display: flex; background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px; overflow: hidden;
    }
    .stt-opt {
      padding: 5px 11px; font-size: 11px; font-weight: 600;
      cursor: pointer; color: var(--dim); transition: all 0.2s;
    }
    .stt-opt.active { background: var(--A); color: #fff; }

    /* ══ CAMERA MODE ══ */
    #cam-video {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1);
    }
    #cam-bubbles {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      width: 85%; display: flex; flex-direction: column-reverse;
      align-items: center; gap: 8px; z-index: 3;
    }
    .cam-bubble {
      background: rgba(10,10,30,0.72);
      border: 1.5px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      padding: 10px 18px; border-radius: 22px;
      font-size: 15px; font-weight: 500; line-height: 1.5;
      text-align: center; max-width: 90%; word-break: break-word;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      opacity: 0; transform: translateY(20px) scale(0.92);
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .cam-bubble.show { opacity: 1; transform: translateY(0) scale(1); }
    .cam-bubble.old { opacity: 0.4; transform: translateY(-4px) scale(0.95); font-size: 13px; }
    .cam-bubble.fading { opacity: 0; transform: translateY(-16px) scale(0.88); }
    #cam-interim {
      position: fixed; bottom: 82px; left: 50%; transform: translateX(-50%);
      background: rgba(88,101,242,0.25); border: 1.5px dashed rgba(88,101,242,0.6);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 8px 16px; border-radius: 18px; font-size: 14px;
      color: rgba(255,255,255,0.75); max-width: 80%; text-align: center;
      display: none; z-index: 4;
    }
    #cam-ctrl {
      position: fixed; bottom: 0; left: 0; right: 0; height: 74px;
      padding: 0 24px;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
      display: flex; align-items: center; justify-content: space-between; z-index: 5;
    }
    .cam-btn {
      background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: #fff; border-radius: 50%; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .cam-btn:active { transform: scale(0.88); }
    .cam-mic-btn { width: 60px; height: 60px; font-size: 24px; background: rgba(88,101,242,0.8); border-color: rgba(88,101,242,0.4); }
    .cam-mic-btn.recording { background: rgba(229,57,53,0.85); border-color: rgba(229,57,53,0.4); animation: cam-pulse 1.2s ease-in-out infinite; }
    .cam-mic-btn.thinking { background: rgba(255,152,0,0.85); border-color: rgba(255,152,0,0.4); animation: cam-pulse 0.6s ease-in-out infinite; }
    @keyframes cam-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(229,57,53,0.5)} 50%{box-shadow:0 0 0 14px rgba(229,57,53,0)} }
    #cam-status {
      position: fixed; top: 16px; left: 16px;
      background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 5px 12px; border-radius: 20px; font-size: 12px;
      color: rgba(255,255,255,0.8); display: flex; align-items: center; gap: 6px; z-index: 5;
    }
    #cam-status .dot { width: 7px; height: 7px; border-radius: 50%; background: #888; }
    #cam-status .dot.live { background: #E53935; animation: blink 1s step-end infinite; }
    #cam-status .dot.think { background: #FF9800; animation: blink 0.4s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ══ SHARED STYLES ══ */
    .hdr {
      position: fixed; top: 0; left: 0; right: 0; height: 42px; padding: 0 14px;
      background: rgba(0,0,0,0.55); border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; gap: 8px; z-index: 10;
    }
    .hdr-title { flex: 1; font-size: 13px; font-weight: 600; }
    .hdr-badge { font-size: 11px; color: var(--dim); background: var(--surf); padding: 2px 8px; border-radius: 10px; }
    .stage { position: fixed; top: 42px; left: 0; right: 0; bottom: 68px; background: var(--bg); overflow: hidden; }
    .stage-bg {
      background: radial-gradient(ellipse at 20% 50%, rgba(88,101,242,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 50%, rgba(39,174,96,0.08) 0%, transparent 60%);
      width: 100%; height: 100%;
    }
    .zone { position: absolute; display: flex; flex-direction: column; gap: 8px; }
    .z-left   { left: 10px; right: 52%; top: 10%; bottom: 10%; justify-content: center; align-items: flex-start; }
    .z-right  { right: 10px; left: 52%; top: 10%; bottom: 10%; justify-content: center; align-items: flex-end; }
    .z-center { left: 12%; right: 12%; top: 15%; bottom: 15%; justify-content: center; align-items: center; }
    .z-top    { left: 10%; right: 10%; top: 6%; height: 28%; justify-content: flex-start; align-items: center; }
    .bubble {
      position: relative; max-width: 100%; padding: 9px 14px; border-radius: 20px;
      font-size: 14px; line-height: 1.55; font-weight: 500; word-break: break-word;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.08) inset;
      opacity: 0; transform-origin: center bottom;
    }
    .bubble::after { content:''; position:absolute; width:12px; height:12px; bottom:-5px; clip-path:polygon(0 0,100% 0,50% 100%); }
    .bubble.pos-left::after  { left: 18px; }
    .bubble.pos-right::after { right: 18px; }
    .bubble.pos-center::after, .bubble.pos-top::after { display: none; }
    .sp-A{background:var(--A)} .sp-A::after{background:var(--A)}
    .sp-B{background:var(--B)} .sp-B::after{background:var(--B)}
    .sp-C{background:var(--C)} .sp-C::after{background:var(--C)}
    .sp-D{background:var(--D);color:#111} .sp-D::after{background:var(--D)}
    @keyframes inLeft   { 0%{opacity:0;transform:translateX(-18px) scale(.82)} 55%{transform:translateX(3px) scale(1.04)} 100%{opacity:1;transform:none} }
    @keyframes inRight  { 0%{opacity:0;transform:translateX(18px) scale(.82)}  55%{transform:translateX(-3px) scale(1.04)} 100%{opacity:1;transform:none} }
    @keyframes inCenter { 0%{opacity:0;transform:scale(.72)} 65%{transform:scale(1.06)} 100%{opacity:1;transform:none} }
    @keyframes inTop    { 0%{opacity:0;transform:translateY(-14px) scale(.88)} 100%{opacity:1;transform:none} }
    @keyframes outAnim  { 0%{opacity:1;transform:none} 100%{opacity:0;transform:scale(.82)} }
    .anim-left   { animation: inLeft   0.38s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .anim-right  { animation: inRight  0.38s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .anim-center { animation: inCenter 0.42s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .anim-top    { animation: inTop    0.36s ease-out forwards; }
    .anim-out    { animation: outAnim  0.22s ease-in forwards; }
    .ctrl {
      position: fixed; bottom: 0; left: 0; right: 0; height: 68px; padding: 10px 14px;
      background: rgba(0,0,0,0.55); border-top: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; gap: 10px; z-index: 10;
    }
    .btn { background:var(--surf); border:none; color:#fff; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.15s,transform 0.1s; }
    .btn:active { transform: scale(0.9); }
    .btn-sm   { width:32px; height:32px; font-size:13px; }
    .btn-play { width:42px; height:42px; font-size:18px; background:var(--A); }
    .mic-btn { width:52px; height:52px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:22px; background:var(--A); transition:all 0.2s; }
    .mic-btn.recording { background:#E53935; animation:pulse 1s ease-in-out infinite; }
    .mic-btn.thinking  { background:#FF9800; animation:pulse 0.5s ease-in-out infinite; }
    .mic-btn:active { transform: scale(0.9); }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(229,57,53,.5)} 50%{box-shadow:0 0 0 12px rgba(229,57,53,0)} }
    .rec-status { font-size:12px; color:var(--dim); text-align:center; flex:1; }
    .clr-btn { background:var(--surf); border:none; color:var(--dim); padding:6px 12px; border-radius:12px; cursor:pointer; font-size:12px; flex-shrink:0; }
    .interim-bubble {
      position:absolute; left:50%; transform:translateX(-50%); bottom:12px;
      background:rgba(88,101,242,0.3); border:1px dashed rgba(88,101,242,0.7);
      padding:7px 14px; border-radius:16px; font-size:13px; color:rgba(255,255,255,0.8);
      max-width:70%; text-align:center; display:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .prog-col { flex:1; display:flex; flex-direction:column; gap:5px; }
    .prog-track { height:4px; background:rgba(255,255,255,0.12); border-radius:2px; cursor:pointer; position:relative; }
    .prog-fill  { height:100%; background:var(--A); border-radius:2px; width:0%; pointer-events:none; transition:width 0.08s linear; }
    .prog-thumb { position:absolute; top:50%; transform:translate(-50%,-50%); width:10px; height:10px; background:#fff; border-radius:50%; pointer-events:none; left:0%; box-shadow:0 0 0 2px rgba(88,101,242,0.6); transition:left 0.08s linear; }
    .time-row   { display:flex; justify-content:space-between; font-size:10px; color:var(--dim); }
    .speed-btn  { background:var(--surf); border:none; color:rgba(255,255,255,.7); padding:4px 9px; border-radius:10px; cursor:pointer; font-size:11px; font-weight:700; flex-shrink:0; }
    .legend { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
    .leg-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--dim); }
    .leg-dot  { width:8px; height:8px; border-radius:50%; }
    .center-msg { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:14px; text-align:center; padding:24px; color:var(--dim); font-size:14px; }
    .center-msg .icon { font-size:40px; }
  </style>
</head>
<body>
<div id="root"></div>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  const mode   = params.get('mode') || 'camera';
  const lang   = params.get('lang') || 'zh-CN';

  /* ══════════════════════════════════════════════════
     WHISPER ENGINE
     Loads Transformers.js + whisper-tiny on demand.
     Falls back to Web Speech API if skipped.
  ══════════════════════════════════════════════════ */
  const W = {
    pipe: null,           // Transformers.js ASR pipeline
    ready: false,         // model loaded
    useWhisper: true,     // current STT mode
    loading: false,
    skipped: false,

    // Determine model from lang
    modelId() {
      return lang.startsWith('zh') ? 'Xenova/whisper-tiny' : 'Xenova/whisper-tiny.en';
    },

    // Show/update loading overlay
    showOverlay() {
      const ov = document.createElement('div');
      ov.id = 'wl-overlay';
      ov.innerHTML = `
        <div class="wl-box">
          <div class="wl-icon">🤖</div>
          <div class="wl-title">加载 Whisper 模型</div>
          <div class="wl-sub">首次约 75MB，之后本地缓存<br>语言：${lang.startsWith('zh') ? '中文' : 'English'}</div>
          <div class="wl-bar"><div class="wl-fill" id="wl-fill"></div></div>
          <div class="wl-pct" id="wl-pct">连接中…</div>
          <button class="wl-skip" id="wl-skip">跳过，用云端识别</button>
        </div>`;
      document.body.appendChild(ov);
      document.getElementById('wl-skip').addEventListener('click', () => W.skip());
    },

    updateProgress(pct, label) {
      const fill = document.getElementById('wl-fill');
      const pctEl = document.getElementById('wl-pct');
      if (fill) fill.style.width = pct + '%';
      if (pctEl) pctEl.textContent = label || pct + '%';
    },

    hideOverlay() {
      const ov = document.getElementById('wl-overlay');
      if (ov) { ov.style.transition = 'opacity 0.4s'; ov.style.opacity = '0'; setTimeout(() => ov.remove(), 400); }
    },

    skip() {
      W.skipped = true;
      W.useWhisper = false;
      W.hideOverlay();
      if (W._onReady) W._onReady(false); // false = using cloud
    },

    _onReady: null,

    async load(onReady) {
      if (W.ready) { onReady(true); return; }
      W._onReady = onReady;
      W.loading = true;
      W.showOverlay();

      try {
        // Dynamic ES module import
        const tf = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js');
        tf.env.allowLocalModels = false;
        tf.env.useBrowserCache = true;

        W.pipe = await tf.pipeline('automatic-speech-recognition', W.modelId(), {
          progress_callback: (info) => {
            if (info.status === 'downloading') {
              const pct = info.total > 0 ? Math.round((info.loaded / info.total) * 100) : 0;
              W.updateProgress(pct, `下载中 ${pct}%  ${(info.loaded/1024/1024).toFixed(1)}MB`);
            } else if (info.status === 'loading') {
              W.updateProgress(95, '模型载入中…');
            } else if (info.status === 'ready') {
              W.updateProgress(100, '✅ 就绪');
            }
          }
        });

        W.ready = true;
        W.loading = false;
        W.hideOverlay();
        onReady(true);
      } catch (err) {
        console.error('Whisper load failed:', err);
        W.updateProgress(0, '❌ 加载失败，切换云端');
        setTimeout(() => W.skip(), 1500);
      }
    },

    // Run inference on a Blob (audio/mp4 or audio/webm)
    async transcribe(audioBlob) {
      if (!W.pipe) return '';
      try {
        const arrayBuffer = await audioBlob.arrayBuffer();
        // Decode audio
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const decoded = await audioCtx.decodeAudioData(arrayBuffer);
        audioCtx.close();

        // Resample to 16kHz mono
        let float32;
        if (decoded.sampleRate === 16000) {
          float32 = decoded.getChannelData(0);
        } else {
          const offline = new OfflineAudioContext(1, Math.ceil(decoded.duration * 16000), 16000);
          const src = offline.createBufferSource();
          src.buffer = decoded;
          src.connect(offline.destination);
          src.start(0);
          const resampled = await offline.startRendering();
          float32 = resampled.getChannelData(0);
        }

        // Check if mostly silence (RMS energy)
        let sumSq = 0;
        for (let i = 0; i < float32.length; i++) sumSq += float32[i] * float32[i];
        const rms = Math.sqrt(sumSq / float32.length);
        if (rms < 0.005) return ''; // silence

        const langCode = lang.startsWith('zh') ? 'chinese' : 'english';
        const result = await W.pipe(float32, {
          sampling_rate: 16000,
          language: langCode,
          task: 'transcribe',
        });
        const text = (result.text || '').trim().replace(/^\[.*?\]$/, ''); // remove [BLANK_AUDIO] etc.
        return text;
      } catch (e) {
        console.error('Whisper transcribe error:', e);
        return '';
      }
    }
  };

  /* ══ STT toggle pill (for camera & record modes) ══ */
  function addSttToggle(onSwitch) {
    const pill = document.createElement('div');
    pill.id = 'stt-toggle';
    pill.innerHTML = `
      <div class="stt-opt active" data-v="whisper">🤖 本地</div>
      <div class="stt-opt" data-v="cloud">☁️ 云端</div>`;
    document.body.appendChild(pill);
    pill.addEventListener('click', (e) => {
      const opt = e.target.closest('.stt-opt');
      if (!opt) return;
      pill.querySelectorAll('.stt-opt').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      const useWhisper = opt.dataset.v === 'whisper';
      W.useWhisper = useWhisper;
      if (useWhisper && !W.ready && !W.loading) {
        W.load((ok) => onSwitch(ok));
      } else {
        onSwitch(useWhisper && W.ready);
      }
    });
    // Update pill to cloud if skipped
    if (!W.useWhisper) {
      pill.querySelector('[data-v="whisper"]').classList.remove('active');
      pill.querySelector('[data-v="cloud"]').classList.add('active');
    }
  }

  /* ══ Web Speech API (cloud fallback) ══ */
  function buildSpeechRec(onFinal, onInterim, onError, onEnd) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    const rec = new SR();
    rec.lang = lang; rec.continuous = true; rec.interimResults = true;
    rec.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) onFinal(e.results[i][0].transcript.trim());
        else interim += e.results[i][0].transcript;
      }
      if (interim) onInterim(interim);
    };
    rec.onerror = onError;
    rec.onend = onEnd;
    return rec;
  }

  /* ═══════════════════════════════════════
     CAMERA MODE — AR bubble overlay
  ═══════════════════════════════════════ */
  if (mode === 'camera') {
    document.getElementById('root').innerHTML = `
      <video id="cam-video" autoplay playsinline muted></video>
      <div id="cam-status"><div class="dot" id="cam-dot"></div><span id="cam-txt">初始化中…</span></div>
      <div id="cam-bubbles"></div>
      <div id="cam-interim"></div>
      <div id="cam-ctrl">
        <button class="cam-btn" id="cam-flip" title="翻转">🔄</button>
        <button class="cam-btn cam-mic-btn" id="cam-mic">🎙️</button>
        <button class="cam-btn" id="cam-clear" title="清空">🗑️</button>
      </div>`;

    const video     = document.getElementById('cam-video');
    const bubblesEl = document.getElementById('cam-bubbles');
    const interimEl = document.getElementById('cam-interim');
    const camDot    = document.getElementById('cam-dot');
    const camTxt    = document.getElementById('cam-txt');
    const micBtn    = document.getElementById('cam-mic');
    const flipBtn   = document.getElementById('cam-flip');
    const clearBtn  = document.getElementById('cam-clear');

    let videoStream = null, useFront = true;
    let isRecording = false;
    let speechRec = null;
    let mediaRec = null, audioChunks = [];
    let bubbleHistory = [];
    const MAX_BUBBLES = 3;
    const CHUNK_MS = 4000;

    // ── Camera ──
    async function startCamera() {
      try {
        if (videoStream) videoStream.getTracks().forEach(t => t.stop());
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: useFront ? 'user' : 'environment' }, audio: false
        });
        video.srcObject = videoStream;
        video.style.transform = useFront ? 'scaleX(-1)' : 'none';
        setStatus('dot', '📷 就绪');
      } catch (e) {
        setStatus('dot', '📷 不可用');
        video.style.display = 'none';
      }
    }

    function setStatus(dotClass, text) {
      camDot.className = 'dot' + (dotClass !== 'dot' ? ' ' + dotClass : '');
      camTxt.textContent = text;
    }

    // ── Bubble display ──
    function addCamBubble(text) {
      if (!text || !text.trim()) return;
      bubbleHistory.push(text.trim());
      bubblesEl.innerHTML = '';
      const recent = bubbleHistory.slice(-MAX_BUBBLES);
      recent.forEach((txt, i) => {
        const el = document.createElement('div');
        const isLatest = (i === recent.length - 1);
        el.className = 'cam-bubble' + (isLatest ? '' : ' old');
        el.textContent = txt;
        bubblesEl.prepend(el);
        if (isLatest) requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
      });
      interimEl.style.display = 'none';
      interimEl.textContent = '';
    }

    // ── Whisper MediaRecorder mode ──
    async function startWhisperRec() {
      let audioStream;
      try {
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch(e) {
        setStatus('dot', '🎙️ 麦克风被拒绝');
        return;
      }

      const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg']
        .find(t => MediaRecorder.isTypeSupported(t)) || '';
      const opts = mimeType ? { mimeType } : {};
      mediaRec = new MediaRecorder(audioStream, opts);

      mediaRec.ondataavailable = async (e) => {
        if (!isRecording) return;
        if (e.data && e.data.size > 1000) {
          // Show "thinking" while Whisper infers
          setStatus('dot think', '🤖 识别中…');
          micBtn.className = 'cam-btn cam-mic-btn thinking';
          const text = await W.transcribe(e.data);
          if (isRecording) {
            micBtn.className = 'cam-btn cam-mic-btn recording';
            setStatus('dot live', '🔴 监听中…');
            addCamBubble(text);
          }
        }
      };

      mediaRec.start(CHUNK_MS);
      isRecording = true;
      micBtn.className = 'cam-btn cam-mic-btn recording';
      micBtn.textContent = '⏹️';
      setStatus('dot live', '🔴 监听中…');
    }

    function stopWhisperRec() {
      isRecording = false;
      if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
      mediaRec = null;
      micBtn.className = 'cam-btn cam-mic-btn';
      micBtn.textContent = '🎙️';
      setStatus('dot', '📷 就绪');
    }

    // ── Web Speech API mode ──
    function startCloudRec() {
      speechRec = buildSpeechRec(
        (t) => addCamBubble(t),
        (t) => { interimEl.textContent = t; interimEl.style.display = 'block'; },
        (e) => { setStatus('dot', '错误: ' + e.error); stopCloudRec(); },
        () => { if (isRecording) try { speechRec.start(); } catch(_){} }
      );
      if (!speechRec) { setStatus('dot', '不支持语音识别'); return; }
      isRecording = true;
      micBtn.className = 'cam-btn cam-mic-btn recording';
      micBtn.textContent = '⏹️';
      setStatus('dot live', '🔴 识别中…');
      try { speechRec.start(); } catch(_) {}
    }

    function stopCloudRec() {
      isRecording = false;
      interimEl.style.display = 'none';
      try { speechRec && speechRec.stop(); } catch(_) {}
      speechRec = null;
      micBtn.className = 'cam-btn cam-mic-btn';
      micBtn.textContent = '🎙️';
      setStatus('dot', '📷 就绪');
    }

    // ── Toggle logic ──
    micBtn.addEventListener('click', () => {
      if (isRecording) { W.useWhisper ? stopWhisperRec() : stopCloudRec(); return; }
      if (W.useWhisper) startWhisperRec();
      else startCloudRec();
    });

    flipBtn.addEventListener('click', () => { useFront = !useFront; startCamera(); });
    clearBtn.addEventListener('click', () => { bubbleHistory = []; bubblesEl.innerHTML = ''; interimEl.style.display = 'none'; });

    // ── Init ──
    startCamera();
    addSttToggle((whisperReady) => {
      if (isRecording) { W.useWhisper ? stopWhisperRec() : stopCloudRec(); isRecording = false; }
      if (!whisperReady && W.useWhisper) {
        // Whisper not ready yet but toggle hit — update pill
        const pill = document.getElementById('stt-toggle');
        if (pill) { pill.querySelectorAll('.stt-opt').forEach(o => o.classList.remove('active')); pill.querySelector('[data-v="cloud"]').classList.add('active'); }
        W.useWhisper = false;
      }
    });

    // Auto-load Whisper
    W.load((ok) => {
      if (ok) setStatus('dot', '🤖 Whisper 就绪，点击开始');
      else setStatus('dot', '☁️ 云端模式就绪');
    });
    return;
  }

  /* ═══════════════════════════════════════
     RECORD MODE — Audio only
  ═══════════════════════════════════════ */
  if (mode === 'record') {
    document.getElementById('root').innerHTML = `
      <div class="hdr">
        <span>🎙️</span>
        <span class="hdr-title">实时气泡字幕</span>
        <span class="hdr-badge" id="stt-badge">Whisper</span>
      </div>
      <div class="stage"><div class="stage-bg">
        <div class="zone z-center" id="z-center"></div>
        <div class="interim-bubble" id="interim"></div>
      </div></div>
      <div class="ctrl">
        <button class="clr-btn" id="btn-clear">清空</button>
        <button class="mic-btn" id="mic-btn">🎙️</button>
        <div class="rec-status" id="rec-status">点击麦克风<br>开始录音</div>
      </div>`;

    const micBtn    = document.getElementById('mic-btn');
    const recStatus = document.getElementById('rec-status');
    const interimEl = document.getElementById('interim');
    const zone      = document.getElementById('z-center');
    const btnClear  = document.getElementById('btn-clear');
    const badge     = document.getElementById('stt-badge');
    const COLORS    = ['A','B','C','D'];
    let count = 0, isRec = false, speechRec = null, mediaRec = null;
    const CHUNK_MS = 4000;

    function addBubble(text) {
      if (!text || !text.trim()) return;
      const slot = COLORS[count++ % 4];
      const el = document.createElement('div');
      el.className = `bubble sp-${slot} pos-center`;
      el.textContent = text.trim();
      zone.appendChild(el);
      void el.offsetHeight;
      el.classList.add('anim-center');
      while (zone.children.length > 4) { const o = zone.children[0]; o.classList.add('anim-out'); setTimeout(() => o.remove(), 230); }
      interimEl.style.display = 'none';
    }

    // Whisper mode
    async function startWhisperRec() {
      let audioStream;
      try { audioStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
      catch(e) { recStatus.textContent = '🎙️ 麦克风被拒绝'; return; }

      const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg']
        .find(t => MediaRecorder.isTypeSupported(t)) || '';
      mediaRec = new MediaRecorder(audioStream, mimeType ? { mimeType } : {});
      mediaRec.ondataavailable = async (e) => {
        if (!isRec) return;
        if (e.data && e.data.size > 1000) {
          micBtn.className = 'mic-btn thinking';
          recStatus.innerHTML = '🤖 识别中…';
          const text = await W.transcribe(e.data);
          if (isRec) {
            micBtn.className = 'mic-btn recording';
            recStatus.innerHTML = '录音中…<br>说话吧';
            addBubble(text);
          }
        }
      };
      mediaRec.start(CHUNK_MS);
      isRec = true;
      micBtn.className = 'mic-btn recording';
      micBtn.textContent = '⏹️';
      recStatus.innerHTML = '录音中…<br>说话吧';
    }

    function stopWhisperRec() {
      isRec = false;
      if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
      mediaRec = null;
      micBtn.className = 'mic-btn';
      micBtn.textContent = '🎙️';
      recStatus.innerHTML = '点击麦克风<br>开始录音';
    }

    // Cloud mode
    function startCloudRec() {
      speechRec = buildSpeechRec(
        (t) => { addBubble(t); },
        (t) => { interimEl.textContent = t; interimEl.style.display = 'block'; },
        (e) => { recStatus.textContent = '错误:' + e.error; stopCloudRec(); },
        () => { if(isRec) try{speechRec.start();}catch(_){} }
      );
      if (!speechRec) { recStatus.textContent = '不支持语音识别'; return; }
      isRec = true;
      micBtn.className = 'mic-btn recording';
      micBtn.textContent = '⏹️';
      recStatus.innerHTML = '录音中…<br>说话吧';
      try { speechRec.start(); } catch(_) {}
    }

    function stopCloudRec() {
      isRec = false;
      try { speechRec && speechRec.stop(); } catch(_) {}
      speechRec = null;
      micBtn.className = 'mic-btn';
      micBtn.textContent = '🎙️';
      interimEl.style.display = 'none';
      recStatus.innerHTML = '点击麦克风<br>开始录音';
    }

    micBtn.addEventListener('click', () => {
      if (isRec) { W.useWhisper ? stopWhisperRec() : stopCloudRec(); return; }
      if (W.useWhisper) startWhisperRec();
      else startCloudRec();
    });
    btnClear.addEventListener('click', () => { zone.innerHTML = ''; count = 0; interimEl.style.display = 'none'; });

    addSttToggle((ok) => {
      if (isRec) { W.useWhisper ? stopWhisperRec() : stopCloudRec(); isRec = false; }
      badge.textContent = (ok || W.useWhisper) && W.ready ? 'Whisper' : '云端';
      if (!ok && W.useWhisper) {
        const pill = document.getElementById('stt-toggle');
        if (pill) { pill.querySelectorAll('.stt-opt').forEach(o => o.classList.remove('active')); pill.querySelector('[data-v="cloud"]').classList.add('active'); }
        W.useWhisper = false;
      }
    });

    W.load((ok) => {
      badge.textContent = ok ? 'Whisper ✅' : '云端';
      if (ok) recStatus.innerHTML = '🤖 Whisper 就绪<br>点击开始';
    });
    return;
  }

  /* ═══════════════════════════════════════
     PLAY MODE — Timestamp playback
  ═══════════════════════════════════════ */
  const raw = params.get('data');
  if (!raw) {
    document.getElementById('root').innerHTML = '<div class="center-msg"><div class="icon">⚠️</div><div>无字幕数据</div></div>';
    return;
  }
  let data;
  try { data = JSON.parse(decodeURIComponent(raw)); }
  catch(e) { document.getElementById('root').innerHTML = '<div class="center-msg"><div class="icon">❌</div><div>数据解析失败</div></div>'; return; }

  const segs     = data.segments || [];
  const totalDur = data.duration || segs[segs.length-1]?.end || 60;
  const title    = data.title || '气泡字幕';
  const spList   = [...new Set(segs.map(s=>s.speaker||'A'))];
  const colorMap = {}; spList.forEach((sp,i)=>{ colorMap[sp]=['A','B','C','D'][i%4]; });
  const hexColor = {A:'#5865F2',B:'#27AE60',C:'#E91E8C',D:'#F39C12'};
  function fmt(s){ return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }

  document.getElementById('root').innerHTML = `
    <div class="hdr">
      <span>🎬</span>
      <span class="hdr-title">${title}</span>
      <span class="hdr-badge">${segs.length} 段</span>
    </div>
    <div class="stage"><div class="stage-bg">
      <div class="zone z-left"   id="z-left"></div>
      <div class="zone z-right"  id="z-right"></div>
      <div class="zone z-center" id="z-center"></div>
      <div class="zone z-top"    id="z-top"></div>
      <div class="legend" id="legend"></div>
    </div></div>
    <div class="ctrl">
      <button class="btn btn-sm" id="btn-restart">↩</button>
      <button class="btn btn-play" id="btn-play">▶</button>
      <div class="prog-col">
        <div class="prog-track" id="prog-track">
          <div class="prog-fill" id="prog-fill"></div>
          <div class="prog-thumb" id="prog-thumb"></div>
        </div>
        <div class="time-row"><span id="t-cur">0:00</span><span id="t-tot">${fmt(totalDur)}</span></div>
      </div>
      <button class="speed-btn" id="speed-btn">1×</button>
    </div>`;

  const legendEl = document.getElementById('legend');
  spList.forEach(sp => {
    legendEl.innerHTML += `<div class="leg-item"><div class="leg-dot" style="background:${hexColor[colorMap[sp]]}"></div><span>说话人 ${sp}</span></div>`;
  });

  let curTime=0, playing=false, lastTs=null, rafId=null, speed=1;
  const SPEEDS=[0.5,1,1.5,2]; let spdIdx=1;
  const active=new Map();

  function zoneEl(pos){ const p=(pos||'center').toLowerCase(); if(p==='left')return document.getElementById('z-left'); if(p==='right')return document.getElementById('z-right'); if(p==='top')return document.getElementById('z-top'); return document.getElementById('z-center'); }
  function animCls(pos){ const p=(pos||'center').toLowerCase(); if(p==='left')return 'anim-left'; if(p==='right')return 'anim-right'; if(p==='top')return 'anim-top'; return 'anim-center'; }
  function showBubble(seg,idx){ if(active.has(idx))return; const zone=zoneEl(seg.position),slot=colorMap[seg.speaker||'A']||'A',pos=(seg.position||'center').toLowerCase(); const el=document.createElement('div'); el.className=`bubble sp-${slot} pos-${pos}`; el.textContent=seg.text; zone.appendChild(el); void el.offsetHeight; el.classList.add(animCls(pos)); while(zone.children.length>2)zone.children[0].remove(); active.set(idx,el); }
  function hideBubble(idx){ const el=active.get(idx); if(!el)return; active.delete(idx); el.classList.add('anim-out'); setTimeout(()=>el.remove(),240); }
  function clearAll(){ active.forEach((_,idx)=>{ const el=active.get(idx); if(el)el.remove(); }); active.clear(); ['z-left','z-right','z-center','z-top'].forEach(id=>{ const z=document.getElementById(id); if(z)z.innerHTML=''; }); }
  function updateUI(){ const pct=totalDur>0?(curTime/totalDur)*100:0; document.getElementById('prog-fill').style.width=pct+'%'; document.getElementById('prog-thumb').style.left=pct+'%'; document.getElementById('t-cur').textContent=fmt(curTime); segs.forEach((seg,idx)=>{ const on=curTime>=seg.start&&curTime<seg.end; if(on&&!active.has(idx))showBubble(seg,idx); if(!on&&active.has(idx))hideBubble(idx); }); }
  function tick(ts){ if(!playing)return; if(lastTs!==null)curTime+=(ts-lastTs)/1000*speed; lastTs=ts; if(curTime>=totalDur){curTime=totalDur;playing=false;document.getElementById('btn-play').textContent='▶';lastTs=null;updateUI();return;} updateUI(); rafId=requestAnimationFrame(tick); }
  function play(){ playing=true; document.getElementById('btn-play').textContent='⏸'; lastTs=null; rafId=requestAnimationFrame(tick); }
  function pause(){ playing=false; document.getElementById('btn-play').textContent='▶'; lastTs=null; if(rafId)cancelAnimationFrame(rafId); }
  function restart(){ pause(); curTime=0; clearAll(); updateUI(); setTimeout(play,150); }

  document.getElementById('btn-play').addEventListener('click',()=>playing?pause():play());
  document.getElementById('btn-restart').addEventListener('click',restart);
  document.getElementById('speed-btn').addEventListener('click',()=>{ spdIdx=(spdIdx+1)%SPEEDS.length; speed=SPEEDS[spdIdx]; document.getElementById('speed-btn').textContent=speed+'×'; });
  document.getElementById('prog-track').addEventListener('click',e=>{ const rect=document.getElementById('prog-track').getBoundingClientRect(); curTime=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width))*totalDur; clearAll(); updateUI(); });
  updateUI();
})();
</script>
</body>
</html>
